name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  bench:
    name: Run benches and commit markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mops and PocketIC
        run: |
          npm install -g ic-mops @dfinity/pocket-ic
          mops --version

      - name: Run benches to markdown
        run: |
          mops bench > benchmark.md

      - name: Commit benchmark.md if changed
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- benchmark.md; then
            echo "No changes in benchmark.md"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add benchmark.md
            git commit -m "chore(bench): update benchmark.md [skip ci]"
            git push
          fi
